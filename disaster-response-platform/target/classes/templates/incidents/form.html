<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Report Incident — DRCP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-dark text-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5 pt-4" style="max-width:700px">
    <div class="d-flex align-items-center mb-4">
        <a href="/incidents" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0"><i class="bi bi-exclamation-triangle text-danger"></i> Report New Incident</h2>
    </div>

    <div class="card bg-secondary shadow">
        <div class="card-body">
            <form th:action="@{/incidents/new}" th:object="${incident}" method="post">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-bold">Incident Title *</label>
                        <input type="text" th:field="*{title}" class="form-control bg-dark text-light border-secondary"
                               placeholder="e.g. Building Collapse - MG Road" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Severity *</label>
                        <select th:field="*{severity}" class="form-select bg-dark text-light border-secondary" required>
                            <option value="">-- Select Severity --</option>
                            <option th:each="s : ${severities}" th:value="${s}" th:text="${s.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Reported By</label>
                        <input type="text" th:field="*{reportedBy}" class="form-control bg-dark text-light border-secondary"
                               placeholder="Field Agent ID / Name">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Location *</label>
                        <input type="text" th:field="*{location}" class="form-control bg-dark text-light border-secondary"
                               placeholder="e.g. MG Road, Bengaluru" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Latitude</label>
                        <input type="number" step="0.0001" th:field="*{latitude}" class="form-control bg-dark text-light border-secondary"
                               placeholder="e.g. 12.9757">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Longitude</label>
                        <input type="number" step="0.0001" th:field="*{longitude}" class="form-control bg-dark text-light border-secondary"
                               placeholder="e.g. 77.5946">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Description</label>
                        <textarea th:field="*{description}" class="form-control bg-dark text-light border-secondary"
                                  rows="4" placeholder="Describe the incident in detail..."></textarea>
                    </div>
                    <div class="col-12 d-flex justify-content-between">
                        <a href="/incidents" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-send"></i> Report Incident
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card bg-secondary mt-3 border-warning">
        <div class="card-body small text-warning">
            <i class="bi bi-info-circle"></i>
            <strong>Pattern Note:</strong> When this form is submitted, the <strong>Observer pattern</strong>
            automatically notifies the Command Center and creates a notification. The system will then use
            the <strong>Strategy pattern</strong> to auto-assign the best available team based on severity.
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
