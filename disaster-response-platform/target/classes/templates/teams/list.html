<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teams — DRCP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-dark text-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container-fluid mt-5 pt-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold"><i class="bi bi-people text-success"></i> Response Teams</h2>
            <span class="badge bg-success" th:text="${availableCount + ' available'}"></span>
            <span class="text-secondary small ms-2">LSP: All team types are ResponseTeam subclasses</span>
        </div>
        <a href="/teams/new" class="btn btn-success"><i class="bi bi-plus-circle"></i> Add Team</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card bg-secondary shadow">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead class="table-secondary text-dark">
                        <tr>
                            <th>#</th>
                            <th>Team Name</th>
                            <th>Type</th>
                            <th>Specialization</th>
                            <th>Status</th>
                            <th>Capacity</th>
                            <th>Load</th>
                            <th>Location</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="team : ${teams}">
                            <td th:text="${team.id}" class="text-secondary"></td>
                            <td>
                                <a th:href="@{/teams/{id}(id=${team.id})}" class="text-light text-decoration-none fw-bold"
                                   th:text="${team.name}"></a>
                            </td>
                            <td>
                                <span class="badge bg-primary" th:text="${team.teamType.displayName}"></span>
                            </td>
                            <td class="small text-info" th:text="${team.specializationDescription}"></td>
                            <td>
                                <span th:class="'badge bg-' + ${team.status.bootstrapColor}"
                                      th:text="${team.status.displayName}"></span>
                            </td>
                            <td th:text="${team.capacity}"></td>
                            <td>
                                <div class="progress" style="height:8px;min-width:60px">
                                    <div class="progress-bar bg-success"
                                         th:style="'width:' + (${team.currentLoad * 100 / team.capacity}) + '%'"></div>
                                </div>
                                <small th:text="${team.currentLoad + '/' + team.capacity}"></small>
                            </td>
                            <td class="small text-secondary" th:text="${team.location}"></td>
                            <td>
                                <a th:href="@{/teams/{id}(id=${team.id})}" class="btn btn-sm btn-outline-info me-1">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/teams/{id}/edit(id=${team.id})}" class="btn btn-sm btn-outline-warning me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/teams/{id}/delete(id=${team.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this team?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(teams)}">
                            <td colspan="9" class="text-center text-secondary py-5">No teams registered</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
