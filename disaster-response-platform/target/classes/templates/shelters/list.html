<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shelters — DRCP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-dark text-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container-fluid mt-5 pt-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold"><i class="bi bi-house-heart text-info"></i> Shelter Management</h2>
            <span class="badge bg-info text-dark" th:text="${openCount + ' open'}"></span>
            <span class="text-secondary small ms-2">
                Total: <span th:text="${totalOccupancy}">0</span> / <span th:text="${totalCapacity}">0</span> occupancy
            </span>
        </div>
        <a href="/shelters/new" class="btn btn-info text-dark"><i class="bi bi-plus-circle"></i> Add Shelter</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3">
        <div th:each="shelter : ${shelters}" class="col-md-6 col-xl-4">
            <div class="card bg-secondary shadow h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold" th:text="${shelter.name}"></h6>
                    <span th:class="'badge bg-' + ${shelter.status.bootstrapColor}"
                          th:text="${shelter.status.displayName}"></span>
                </div>
                <div class="card-body">
                    <div class="small text-secondary mb-2"><i class="bi bi-geo-alt"></i> <span th:text="${shelter.location}"></span></div>

                    <!-- Occupancy bar -->
                    <div class="mb-2">
                        <div class="d-flex justify-content-between small">
                            <span>Occupancy</span>
                            <span th:text="${shelter.currentOccupancy + ' / ' + shelter.capacity}"></span>
                        </div>
                        <div class="progress" style="height:10px">
                            <div th:class="'progress-bar ' + (${shelter.occupancyPercentage >= 90 ? 'bg-danger' : shelter.occupancyPercentage >= 70 ? 'bg-warning' : 'bg-success'})"
                                 th:style="'width:' + ${shelter.occupancyPercentage} + '%'"></div>
                        </div>
                        <small class="text-secondary" th:text="${shelter.occupancyPercentage + '% full'}"></small>
                    </div>

                    <!-- Amenities -->
                    <div class="mb-3">
                        <span class="badge bg-success me-1" th:if="${shelter.hasFood}"><i class="bi bi-basket"></i> Food</span>
                        <span class="badge bg-danger me-1" th:if="${shelter.hasMedical}"><i class="bi bi-heart-pulse"></i> Medical</span>
                        <span class="badge bg-warning text-dark me-1" th:if="${shelter.hasPower}"><i class="bi bi-lightning"></i> Power</span>
                    </div>

                    <div class="small text-secondary" th:if="${shelter.contactPerson}">
                        <i class="bi bi-person"></i> <span th:text="${shelter.contactPerson}"></span>
                        &nbsp;<i class="bi bi-telephone"></i> <span th:text="${shelter.contactPhone}"></span>
                    </div>
                </div>
                <div class="card-footer d-flex gap-2 flex-wrap">
                    <form th:action="@{/shelters/{id}/open(id=${shelter.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-success" th:disabled="${shelter.status.name() == 'OPEN'}">
                            <i class="bi bi-door-open"></i> Open
                        </button>
                    </form>
                    <form th:action="@{/shelters/{id}/close(id=${shelter.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="bi bi-door-closed"></i> Close
                        </button>
                    </form>
                    <!-- Occupancy +/- -->
                    <form th:action="@{/shelters/{id}/occupancy(id=${shelter.id})}" method="post" class="d-flex gap-1">
                        <input type="hidden" name="delta" value="10">
                        <button type="submit" class="btn btn-sm btn-outline-light">+10</button>
                    </form>
                    <form th:action="@{/shelters/{id}/occupancy(id=${shelter.id})}" method="post" class="d-flex gap-1">
                        <input type="hidden" name="delta" value="-10">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">-10</button>
                    </form>
                    <a th:href="@{/shelters/{id}/edit(id=${shelter.id})}" class="btn btn-sm btn-outline-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/shelters/{id}/delete(id=${shelter.id})}" method="post"
                          onsubmit="return confirm('Delete?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(shelters)}">
            <div class="card bg-secondary text-center py-5">
                <i class="bi bi-house fs-1 text-secondary"></i>
                <p class="text-secondary">No shelters registered</p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
