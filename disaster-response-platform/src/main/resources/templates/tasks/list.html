<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tasks — DRCP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-dark text-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container-fluid mt-5 pt-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold"><i class="bi bi-list-task text-warning"></i> Task Assignments</h2>
            <span class="text-secondary small">All team-to-incident assignments (Command pattern audit log)</span>
        </div>
        <div class="d-flex gap-2">
            <form action="/tasks/undo-last" method="post">
                <button type="submit" class="btn btn-outline-danger"><i class="bi bi-arrow-counterclockwise"></i> Undo Last</button>
            </form>
            <a href="/tasks/assign" class="btn btn-warning text-dark"><i class="bi bi-person-plus"></i> New Assignment</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card bg-secondary shadow">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead class="table-secondary text-dark">
                        <tr>
                            <th>#</th>
                            <th>Incident</th>
                            <th>Assigned Team</th>
                            <th>Strategy Used</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Assigned At</th>
                            <th>Completed At</th>
                            <th>Update Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="task : ${tasks}">
                            <td th:text="${task.id}" class="text-secondary"></td>
                            <td class="fw-bold small" th:text="${task.incidentTitle}"></td>
                            <td th:text="${task.assignedTeamName}"></td>
                            <td class="small text-info" th:text="${task.assignmentStrategy}"></td>
                            <td><span class="badge bg-secondary" th:text="${task.priority}"></span></td>
                            <td>
                                <span th:class="'badge bg-' + ${task.status.bootstrapColor}"
                                      th:text="${task.status.displayName}"></span>
                            </td>
                            <td class="small text-secondary"
                                th:text="${#temporals.format(task.assignedAt, 'dd MMM HH:mm')}"></td>
                            <td class="small text-secondary"
                                th:text="${task.completedAt != null ? #temporals.format(task.completedAt, 'dd MMM HH:mm') : '—'}"></td>
                            <td>
                                <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post" class="d-flex gap-1">
                                    <select name="status" class="form-select form-select-sm bg-dark text-light border-secondary" style="width:120px">
                                        <option th:each="s : ${T(com.disaster.response.model.TaskStatus).values()}"
                                                th:value="${s}"
                                                th:text="${s.displayName}"
                                                th:selected="${s == task.status}"></option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-outline-light">OK</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(tasks)}">
                            <td colspan="9" class="text-center text-secondary py-5">No tasks assigned yet</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
