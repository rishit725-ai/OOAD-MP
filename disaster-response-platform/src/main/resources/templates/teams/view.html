<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${team.name} + ' — DRCP'">Team</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-dark text-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5 pt-3" style="max-width:800px">
    <div class="d-flex align-items-center mb-4">
        <a href="/teams" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0" th:text="${team.name}"></h2>
        <span class="badge bg-primary ms-2" th:text="${team.teamType.displayName}"></span>
        <span th:class="'badge ms-2 bg-' + ${team.status.bootstrapColor}"
              th:text="${team.status.displayName}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3">
        <div class="col-md-7">
            <div class="card bg-secondary shadow">
                <div class="card-header"><h5 class="mb-0"><i class="bi bi-info-circle"></i> Team Details</h5></div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5 text-secondary">Specialization</dt>
                        <dd class="col-sm-7 text-info" th:text="${team.specializationDescription}"></dd>

                        <dt class="col-sm-5 text-secondary">Location</dt>
                        <dd class="col-sm-7" th:text="${team.location}"></dd>

                        <dt class="col-sm-5 text-secondary">Contact</dt>
                        <dd class="col-sm-7" th:text="${team.contactInfo ?: 'N/A'}"></dd>

                        <dt class="col-sm-5 text-secondary">Capacity</dt>
                        <dd class="col-sm-7">
                            <span th:text="${team.currentLoad + ' / ' + team.capacity}"></span>
                            <div class="progress mt-1" style="height:6px">
                                <div class="progress-bar bg-success"
                                     th:style="'width:' + (${team.currentLoad * 100 / team.capacity}) + '%'"></div>
                            </div>
                        </dd>

                        <dt class="col-sm-5 text-secondary">Description</dt>
                        <dd class="col-sm-7" th:text="${team.description ?: 'No description'}"></dd>

                        <dt class="col-sm-5 text-secondary" th:if="${team.latitude != null}">Coordinates</dt>
                        <dd class="col-sm-7 font-monospace small" th:if="${team.latitude != null}"
                            th:text="${team.latitude + ', ' + team.longitude}"></dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card bg-secondary shadow">
                <div class="card-header"><h5 class="mb-0"><i class="bi bi-gear"></i> Actions</h5></div>
                <div class="card-body d-grid gap-2">
                    <a th:href="@{/teams/{id}/edit(id=${team.id})}" class="btn btn-warning">
                        <i class="bi bi-pencil"></i> Edit Team
                    </a>
                    <form th:action="@{/teams/{id}/delete(id=${team.id})}" method="post"
                          onsubmit="return confirm('Delete this team?')">
                        <button type="submit" class="btn btn-outline-danger w-100">
                            <i class="bi bi-trash"></i> Delete Team
                        </button>
                    </form>
                </div>
            </div>
            <div class="card bg-dark border-info mt-3">
                <div class="card-body small text-info">
                    <strong>LSP Demonstrated:</strong><br>
                    This <code th:text="${team.getClass().getSimpleName()}">Team</code> is a concrete subclass
                    of <code>ResponseTeam</code>. The Strategy, Command and Facade patterns all operate
                    on <code>ResponseTeam</code> references without knowing the concrete type.
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
