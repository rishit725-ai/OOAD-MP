<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Incident — DRCP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-dark text-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5 pt-4" style="max-width:700px">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/incidents/{id}(id=${incident.id})}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0"><i class="bi bi-pencil text-warning"></i> Edit Incident</h2>
    </div>
    <div class="card bg-secondary shadow">
        <div class="card-body">
            <form th:action="@{/incidents/{id}/edit(id=${incident.id})}" th:object="${incident}" method="post">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-bold">Title *</label>
                        <input type="text" th:field="*{title}" class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Severity *</label>
                        <select th:field="*{severity}" class="form-select bg-dark text-light border-secondary">
                            <option th:each="s : ${severities}" th:value="${s}" th:text="${s.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Status</label>
                        <select th:field="*{status}" class="form-select bg-dark text-light border-secondary">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Location *</label>
                        <input type="text" th:field="*{location}" class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Latitude</label>
                        <input type="number" step="0.0001" th:field="*{latitude}" class="form-control bg-dark text-light border-secondary">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Longitude</label>
                        <input type="number" step="0.0001" th:field="*{longitude}" class="form-control bg-dark text-light border-secondary">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Description</label>
                        <textarea th:field="*{description}" class="form-control bg-dark text-light border-secondary" rows="4"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Reported By</label>
                        <input type="text" th:field="*{reportedBy}" class="form-control bg-dark text-light border-secondary">
                    </div>
                    <div class="col-12 d-flex justify-content-between mt-2">
                        <a th:href="@{/incidents/{id}(id=${incident.id})}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-warning px-4">
                            <i class="bi bi-save"></i> Save Changes
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
