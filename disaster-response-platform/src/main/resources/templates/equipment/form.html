<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Equipment Form — DRCP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-dark text-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5 pt-4" style="max-width:700px">
    <div class="d-flex align-items-center mb-4">
        <a href="/equipment" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0">
            <i class="bi bi-tools text-warning"></i>
            <span th:if="${equipment.id == null}">Add Equipment</span>
            <span th:if="${equipment.id != null}">Edit Equipment</span>
        </h2>
    </div>
    <div class="card bg-secondary shadow">
        <div class="card-body">
            <form th:action="${equipment.id == null ? '/equipment/new' : '/equipment/' + equipment.id + '/edit'}"
                  th:object="${equipment}" method="post">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label fw-bold">Equipment Name *</label>
                        <input type="text" th:field="*{name}" class="form-control bg-dark text-light border-secondary"
                               placeholder="e.g. Hydraulic Rescue Tool" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Category</label>
                        <input type="text" th:field="*{category}" class="form-control bg-dark text-light border-secondary"
                               placeholder="e.g. Firefighting">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label fw-bold">Model</label>
                        <input type="text" th:field="*{model}" class="form-control bg-dark text-light border-secondary">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Status</label>
                        <select th:field="*{status}" class="form-select bg-dark text-light border-secondary">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Quantity</label>
                        <input type="number" th:field="*{quantity}" class="form-control bg-dark text-light border-secondary" min="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Available Qty</label>
                        <input type="number" th:field="*{availableQuantity}" class="form-control bg-dark text-light border-secondary" min="0">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Assign to Team</label>
                        <select name="assignedTeamId" class="form-select bg-dark text-light border-secondary">
                            <option value="">-- None --</option>
                            <option th:each="t : ${teams}"
                                    th:value="${t.id}"
                                    th:text="${t.name}"
                                    th:selected="${equipment.assignedTeam != null and equipment.assignedTeam.id == t.id}"></option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Storage Location</label>
                        <input type="text" th:field="*{storageLocation}" class="form-control bg-dark text-light border-secondary">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Description</label>
                        <textarea th:field="*{description}" class="form-control bg-dark text-light border-secondary" rows="2"></textarea>
                    </div>
                    <div class="col-12 d-flex justify-content-between">
                        <a href="/equipment" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-warning text-dark px-4">
                            <i class="bi bi-save"></i>
                            <span th:if="${equipment.id == null}">Add Equipment</span>
                            <span th:if="${equipment.id != null}">Save Changes</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
